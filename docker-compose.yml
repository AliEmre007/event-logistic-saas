services:
  db:
    image: postgres:15-alpine
    container_name: event_saas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-eventsaas}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-eventsaas}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    container_name: event_saas_backend
    working_dir: /app/backend
    command: sh -c "npx prisma db push && npm run dev"
    volumes:
      - ./backend:/app/backend
      - ./prisma:/app/prisma
      - backend_node_modules:/app/backend/node_modules
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-eventsaas}?schema=public
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_me_in_production}
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    container_name: event_saas_frontend
    working_dir: /app/frontend
    command: npm run dev
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_DISABLE_WEBPACK_CACHE: "1"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
